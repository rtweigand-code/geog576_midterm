<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Agrow</title>

  <!-- ArcGIS JS -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.26/esri/themes/light/main.css" />
  <script src="https://js.arcgis.com/4.26/"></script>

  <!-- My styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div id="app">
    <!-- left panel -->
    <aside id="sidebar">
      <h1>Search Filters</h1>

      <label for="obsTypeSelect">Observation Type</label>
      <select id="obsTypeSelect">
        <option value="">All</option>
      </select>

      <label for="statusSelect">Status</label>
      <select id="statusSelect">
        <option value="">All</option>
      </select>

      <label for="severitySelect">Severity</label>
      <select id="severitySelect">
        <option value="">All</option>
      </select>

      <label for="cropTypeSelect">Crop Type</label>
      <select id="cropTypeSelect">
        <option value="">All</option>
      </select>

      <button id="searchBtn" class="btn btn-blue">Search</button>
      <button id="clearBtn" class="btn btn-green">Clear Filters</button>

      <!-- CHANGE NOTE (Mar 2026):
           Added a live summary box so users can immediately see how many
           point/area features match the current filter combination. -->
      <section id="filterResults" aria-live="polite">
        <h2>Matching Features</h2>
        <p id="filterResultsText">Checking current filters...</p>
      </section>

      <!-- CHANGE NOTE (Mar 2026):
           Added a clickable list of matching point features.
           Each item shows a numbered title + note snippet and is wired in main.js
           to zoom/pan and open popup when clicked. -->
      <section id="matchingFeatureListWrap" aria-live="polite">
        <h2>Matching Point Features</h2>
        <ul id="matchingFeatureList"></ul>
      </section>


      <p class="tip">Tip: click a point/polygon to view info.</p>
    </aside>

    <!-- map -->
    <main id="viewDiv"></main>
  </div>

  <!-- My JS -->
  <script src="js/main.js"></script>
</body>
</html>
